name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-engine:
    name: Rust Engine tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rust-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/rust-engine

      - name: Run cargo test
        run: cargo test --all-features

  python-api:
    name: Python API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/python-api
    env:
      NASA_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/python-api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v
